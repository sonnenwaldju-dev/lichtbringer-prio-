
<script>
const CURRENT_RAID = "MC"; // Für BWL auf "BWL" ändern
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/export?format=csv&gid=0";

let p0Data = {};
let itemsByClass = {};
let selectedClass = "";
let selectedItem = "";

async function loadP0DataFromSheet() {
  try {
    const response = await fetch(SHEET_CSV_URL);
    const csvText = await response.text();
    const rows = parseCSV(csvText);
    const header = rows.shift().map(h => h.trim().toLowerCase());

    const raidIndex = header.indexOf("raid");
    const klasseIndex = header.indexOf("klasse");
    const itemIndex = header.indexOf("item");
    const spielerIndex = header.indexOf("spieler");
    const anzahlIndex = header.indexOf("anzahl");

    rows.forEach(row => {
      const raid = row[raidIndex]?.trim();
      const klasse = row[klasseIndex]?.trim();
      const item = row[itemIndex]?.trim();
      const spieler = row[spielerIndex]?.trim();
      const anzahl = row[anzahlIndex]?.trim() || "1";

      if (!raid || !klasse || !item || !spieler) return;
      if (raid.toLowerCase() !== CURRENT_RAID.toLowerCase()) return;

      if (!p0Data[item]) p0Data[item] = [];
      p0Data[item].push({ spieler, klasse, anzahl });

      if (!itemsByClass[klasse]) itemsByClass[klasse] = [];
      if (!itemsByClass[klasse].includes(item)) itemsByClass[klasse].push(item);
    });

    const availableClasses = Object.keys(itemsByClass);
    selectedClass = availableClasses[0] || "";
    selectedItem = selectedClass ? itemsByClass[selectedClass][0] : "";

    renderAll();
  } catch (error) {
    console.error("Fehler beim Laden der Sheet-Daten:", error);
  }
}

function parseCSV(text) {
  const rows = [];
  let currentRow = [];
  let currentValue = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];

    if (char === '"' && insideQuotes && nextChar === '"') {
      currentValue += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      currentRow.push(currentValue);
      currentValue = "";
    } else if ((char === "
" || char === "
") && !insideQuotes) {
      if (currentValue || currentRow.length) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }
      currentRow = [];
      currentValue = "";
      if (char === "
" && nextChar === "
") i++;
    } else {
      currentValue += char;
    }
  }

  if (currentValue || currentRow.length) {
    currentRow.push(currentValue);
    rows.push(currentRow);
  }

  return rows;
}

function getClassCss(className) {
  const cssMap = {
    "Krieger": "warrior",
    "Jäger": "hunter",
    "Priester": "priest",
    "Hexenmeister": "warlock",
    "Paladin": "paladin",
    "Schurke": "rogue",
    "Magier": "mage",
    "Druide": "druid"
  };
  return cssMap[className] || "";
}

function renderClasses() {
  const wrapper = document.getElementById("classButtons");
  const classNames = Object.keys(itemsByClass);

  if (classNames.length === 0) {
    wrapper.innerHTML = '<h2 class="panel-title">Klasse wählen</h2><div class="empty">Keine P0-Einträge für diesen Raid im Sheet gefunden.</div>';
    return;
  }

  wrapper.innerHTML = '<h2 class="panel-title">Klasse wählen</h2>' + classNames.map(className => `
    <button class="class-btn ${getClassCss(className)} ${className === selectedClass ? "active" : ""}" onclick="selectClass('${className}')">
      ${className}
    </button>
  `).join("");
}

function renderItems() {
  const wrapper = document.getElementById("itemButtons");
  const title = document.getElementById("itemsTitle");

  if (!selectedClass) {
    title.textContent = "Items";
    wrapper.innerHTML = "";
    return;
  }

  title.textContent = selectedClass + " · " + CURRENT_RAID + " P0 Items";
  const items = itemsByClass[selectedClass] || [];

  wrapper.innerHTML = items.map(item => `
    <button class="item-btn ${item === selectedItem ? "active" : ""}" onclick="selectItem(\`${item}\`)">
      ${item}
    </button>
  `).join("");
}

function renderDetails() {
  const itemTitle = document.getElementById("itemTitle");
  const content = document.getElementById("itemContent");
  const link = document.getElementById("wowheadLink");

  if (!selectedItem) {
    itemTitle.textContent = "Kein Item ausgewählt";
    content.innerHTML = '<div class="empty">Im Sheet sind für diesen Raid noch keine P0-Einträge vorhanden.</div>';
    if (link) link.style.display = "none";
    return;
  }

  itemTitle.textContent = selectedItem;

  if (typeof wowheadLinks !== "undefined" && wowheadLinks[selectedItem]) {
    link.href = wowheadLinks[selectedItem];
    link.style.display = "inline-flex";
  } else if (link) {
    link.style.display = "none";
  }

  const entries = p0Data[selectedItem] || [];

  content.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Spieler</th>
          <th>Klasse</th>
          <th>P0 gesetzt</th>
        </tr>
      </thead>
      <tbody>
        ${entries.map(entry => `
          <tr>
            <td>${entry.spieler}</td>
            <td>${entry.klasse}</td>
            <td>${entry.anzahl}x</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function selectClass(className) {
  selectedClass = className;
  selectedItem = itemsByClass[className][0];
  renderAll();
}

function selectItem(itemName) {
  selectedItem = itemName;
  renderAll();
}

function renderAll() {
  renderClasses();
  renderItems();
  renderDetails();
}

loadP0DataFromSheet();
</script>
