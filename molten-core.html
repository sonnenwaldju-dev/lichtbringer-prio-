<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Molten Core</title>
  <style>
    :root {
      --bg: #08111f;
      --bg2: #111c33;
      --panel: rgba(20, 32, 55, 0.92);
      --gold: #facc15;
      --blue: #60a5fa;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.13);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.22), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    header {
      min-height: 110px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      padding: 18px 24px;
      background: linear-gradient(90deg, rgba(8,17,31,.98), rgba(30,64,175,.88), rgba(8,17,31,.98));
      border-bottom: 1px solid rgba(250,204,21,.32);
      box-shadow: var(--shadow);
    }

    .back {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      font-size: 34px;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(255,255,255,.04);
    }

    .headline {
      text-align: center;
    }

    .headline h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 42px);
      font-weight: 900;
      text-shadow: 0 0 18px rgba(250,204,21,.25);
    }

    .headline p {
      margin: 8px 0 0;
      color: #dbeafe;
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    main {
      width: min(1580px, calc(100% - 32px));
      margin: 28px auto 52px;
      display: grid;
      grid-template-columns: 235px 1fr 1.05fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .classes {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .panel-title {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .class-btn,
    .item-btn {
      border: 0;
      cursor: pointer;
      font-weight: 800;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .class-btn {
      padding: 13px 14px;
      border-radius: 13px;
      color: #111827;
      font-size: 16px;
      text-align: left;
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
    }

    .class-btn:hover,
    .class-btn.active {
      transform: translateX(5px);
      box-shadow: 0 0 0 3px rgba(250,204,21,.25), 0 10px 22px rgba(0,0,0,.28);
    }

    .warrior { background: #c79c6e; }
    .hunter { background: #abd473; }
    .priest { background: #ffffff; }
    .warlock { background: #9482c9; }
    .paladin { background: #f58cba; }
    .rogue { background: #fff569; }
    .mage { background: #69ccf0; }
    .druid { background: #ff7d0a; }

    .items-panel {
      padding: 18px;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .item-btn {
      min-height: 60px;
      padding: 13px 16px;
      border-radius: 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(37,56,91,.98), rgba(22,34,58,.98));
      border: 1px solid rgba(255,255,255,.11);
      border-left: 5px solid var(--gold);
      text-align: left;
      line-height: 1.25;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    .item-btn::before {
      content: "✦";
      color: var(--gold);
      margin-right: 8px;
    }

    .item-btn:hover,
    .item-btn.active {
      background: linear-gradient(180deg, rgba(59,86,135,.98), rgba(30,47,79,.98));
      box-shadow: 0 0 0 2px rgba(250,204,21,.28), 0 13px 28px rgba(0,0,0,.30);
      transform: translateY(-2px);
    }

    .details {
      padding: 22px;
      min-height: 640px;
      background: linear-gradient(180deg, rgba(30,41,59,.96), rgba(15,23,42,.97));
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(250,204,21,.18);
    }

    .details h2 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.15;
    }

    .wowhead-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(250,204,21,.08);
      font-size: 14px;
      font-weight: 800;
    }

    .wowhead-link:hover {
      background: rgba(250,204,21,.16);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,255,255,.035);
    }

    th {
      padding: 12px 11px;
      background: linear-gradient(90deg, rgba(250,204,21,.28), rgba(96,165,250,.18));
      color: var(--text);
      text-align: left;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    td {
      padding: 13px 11px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      color: var(--muted);
      font-weight: 750;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 18px;
      border: 1px dashed rgba(250,204,21,.32);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(250,204,21,.055);
      line-height: 1.5;
      font-weight: 700;
    }

    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(96,165,250,.08);
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid rgba(96,165,250,.18);
    }

    @media (max-width: 1120px) {
      main {
        grid-template-columns: 1fr;
      }

      .items {
        grid-template-columns: 1fr;
      }

      .details {
        min-height: auto;
      }
    }

    @media (max-width: 620px) {
      header {
        grid-template-columns: 52px 1fr 20px;
        padding: 14px;
      }

      .back {
        width: 42px;
        height: 42px;
      }

      main {
        width: min(100% - 20px, 1580px);
        gap: 16px;
      }

      .details-header {
        display: block;
      }

      .wowhead-link {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="index.html">←</a>
    <div class="headline">
      <h1>✨ Lichtbringer · Prio 0 Molten Core</h1>
      <p>Lootübersicht der Gilde Lichtbringer</p>
    </div>
    <div></div>
  </header>

  <main>
    <section class="panel classes" id="classButtons" aria-label="Klassen"></section>

    <section class="panel items-panel" aria-label="Items">
      <h2 class="panel-title" id="itemsTitle">Items</h2>
      <div class="items" id="itemButtons"></div>
    </section>

    <section class="panel details" aria-label="P0-Liste">
      <div class="details-header">
        <h2 id="itemTitle">Item auswählen</h2>
        <a id="wowheadLink" class="wowhead-link" href="#" target="_blank" rel="noopener">Wowhead</a>
      </div>
      <div id="itemContent"></div>
      <div class="hint">
        P0-Daten werden automatisch aus dem Google Sheet geladen. Wichtig: Im Sheet muss in der Spalte <strong>Raid</strong> der Wert <strong>MC</strong> stehen.
      </div>
    </section>
  </main>

  <script>
    const CURRENT_RAID = "MC";
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/export?format=csv&gid=0";

    const classOrder = [
      "Krieger",
      "Jäger",
      "Priester",
      "Hexenmeister",
      "Paladin",
      "Schurke",
      "Magier",
      "Druide"
    ];

    const classCss = {
      "Krieger": "warrior",
      "Jäger": "hunter",
      "Priester": "priest",
      "Hexenmeister": "warlock",
      "Paladin": "paladin",
      "Schurke": "rogue",
      "Magier": "mage",
      "Druide": "druid"
    };

    const wowheadLinks = {
      "Band der Akkuria": "https://www.wowhead.com/classic/item=17063/band-of-accuria",
      "Gurt des Ansturms": "https://www.wowhead.com/classic/item=19137/onslaught-girdle",
      "Perditions Klinge": "https://www.wowhead.com/classic/item=18816/perditions-blade",
      "Kernhundzahn": "https://www.wowhead.com/classic/item=18805/core-hound-tooth",
      "Rechte Fessel des Windsuchers": "https://www.wowhead.com/classic/item=18564/bindings-of-the-windseeker",
      "Linke Fessel des Windsuchers": "https://www.wowhead.com/classic/item=18563/bindings-of-the-windseeker",
      "Auge von Sulfuras": "https://www.wowhead.com/classic/item=17204/eye-of-sulfuras",
      "Flammenwächterstulpen": "https://www.wowhead.com/classic/item=19143/flameguard-gauntlets",
      "Uralter versteinerter Blatt": "https://www.wowhead.com/classic/item=18703/ancient-petrified-leaf",
      "Auge der Offenbarung": "https://www.wowhead.com/classic/item=18646/the-eye-of-divinity",
      "Ring der Zaubermacht": "https://www.wowhead.com/classic/item=19147/ring-of-spell-power",
      "Robe der flüchtigen Macht": "https://www.wowhead.com/classic/item=19145/robe-of-volatile-power",
      "Manazündende Kordel": "https://www.wowhead.com/classic/item=19136/mana-igniting-cord",
      "Band der Sulfuras": "https://www.wowhead.com/classic/item=19138/band-of-sulfuras",
      "Cauterizing Band": "https://www.wowhead.com/classic/item=19140/cauterizing-band",
      "Azuresong Mageblade": "https://www.wowhead.com/classic/item=17103/azuresong-mageblade",
      "Choker of the Fire Lord": "https://www.wowhead.com/classic/item=18814/choker-of-the-fire-lord",
      "Talisman der ephemeren Macht": "https://www.wowhead.com/classic/item=18820/talisman-of-ephemeral-power",
      "Sabatons des Flammenwandlers": "https://www.wowhead.com/classic/item=19144/sabatons-of-the-flamewalker",
      "Wristguards of Stability": "https://www.wowhead.com/classic/item=19146/wristguards-of-stability",
      "Siegelring des Archimagiers": "https://www.wowhead.com/classic/item=17110/seal-of-the-archmagus",
      "Spinal Reaper": "https://www.wowhead.com/classic/item=17104/spinal-reaper",
      "Fire Runed Grimoire": "https://www.wowhead.com/classic/item=19142/fire-runed-grimoire"
    };

    let p0Data = {};
    let itemsByClass = {};
    let selectedClass = "";
    let selectedItem = "";

    async function loadP0DataFromSheet() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);

        if (!rows.length) {
          renderAll();
          return;
        }

        const header = rows.shift().map(h => h.trim().toLowerCase());

        const raidIndex = header.indexOf("raid");
        const klasseIndex = header.indexOf("klasse");
        const itemIndex = header.indexOf("item");
        const spielerIndex = header.indexOf("spieler");
        const anzahlIndex = header.indexOf("anzahl");

        rows.forEach(row => {
          const raid = row[raidIndex]?.trim();
          const klasse = row[klasseIndex]?.trim();
          const item = row[itemIndex]?.trim();
          const spieler = row[spielerIndex]?.trim();
          const anzahl = row[anzahlIndex]?.trim() || "1";

          if (!raid || !klasse || !item || !spieler) return;
          if (raid.toLowerCase() !== CURRENT_RAID.toLowerCase()) return;

          if (!p0Data[item]) p0Data[item] = [];
          p0Data[item].push({ spieler, klasse, anzahl });

          if (!itemsByClass[klasse]) itemsByClass[klasse] = [];
          if (!itemsByClass[klasse].includes(item)) {
            itemsByClass[klasse].push(item);
          }
        });

        const availableClasses = getOrderedClasses();
        selectedClass = availableClasses[0] || "";
        selectedItem = selectedClass ? itemsByClass[selectedClass][0] : "";

        renderAll();
      } catch (error) {
        console.error("Fehler beim Laden der Sheet-Daten:", error);
        renderAll();
      }
    }

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue);
          currentValue = "";
        } else if ((char === "
" || char === "
") && !insideQuotes) {
          if (currentValue || currentRow.length) {
            currentRow.push(currentValue);
            rows.push(currentRow);
          }
          currentRow = [];
          currentValue = "";
          if (char === "
" && nextChar === "
") i++;
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      return rows;
    }

    function getOrderedClasses() {
      return classOrder.filter(className => {
        return itemsByClass[className];
      }).concat(
        Object.keys(itemsByClass).filter(className => !classOrder.includes(className))
      ).sort((a, b) => {
        const aIndex = classOrder.indexOf(a);
        const bIndex = classOrder.indexOf(b);
        if (aIndex === -1 && bIndex === -1) return a.localeCompare(b);
        if (aIndex === -1) return 1;
        if (bIndex === -1) return -1;
        return aIndex - bIndex;
      });
    }

    function renderClasses() {
      const wrapper = document.getElementById("classButtons");
      const classNames = getOrderedClasses();

      if (classNames.length === 0) {
        wrapper.innerHTML = '<h2 class="panel-title">Klasse wählen</h2>' + classOrder.map(className => `
          <button class="class-btn ${classCss[className] || ""}">
            ${className}
          </button>
        `).join("");
        return;
      }

      wrapper.innerHTML = '<h2 class="panel-title">Klasse wählen</h2>' + classOrder.map(className => `
        <button class="class-btn ${classCss[className] || ""} ${className === selectedClass ? "active" : ""}" onclick="selectClass('${className}')">
          ${className}
        </button>
      `).join("");
    }

    function renderItems() {
      const wrapper = document.getElementById("itemButtons");
      const title = document.getElementById("itemsTitle");

      if (!selectedClass) {
        title.textContent = "MC P0 Items";
        wrapper.innerHTML = "";
        return;
      }

      title.textContent = selectedClass + " · MC P0 Items";
      const items = itemsByClass[selectedClass] || [];

      wrapper.innerHTML = items.map(item => `
        <button class="item-btn ${item === selectedItem ? "active" : ""}" onclick="selectItem(\`${item}\`)">
          ${item}
        </button>
      `).join("");
    }

    function renderDetails() {
      const itemTitle = document.getElementById("itemTitle");
      const content = document.getElementById("itemContent");
      const link = document.getElementById("wowheadLink");

      if (!selectedItem) {
        itemTitle.textContent = "Kein Item ausgewählt";
        content.innerHTML = '<div class="empty">Im Sheet sind für MC noch keine P0-Einträge vorhanden.</div>';
        link.style.display = "none";
        return;
      }

      itemTitle.textContent = selectedItem;

      if (wowheadLinks[selectedItem]) {
        link.href = wowheadLinks[selectedItem];
        link.style.display = "inline-flex";
      } else {
        link.style.display = "none";
      }

      const entries = p0Data[selectedItem] || [];

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>P0 gesetzt</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${entry.spieler}</td>
                <td>${entry.klasse}</td>
                <td>${entry.anzahl}x</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function selectClass(className) {
      selectedClass = className;
      selectedItem = itemsByClass[className][0];
      renderAll();
    }

    function selectItem(itemName) {
      selectedItem = itemName;
      renderAll();
    }

    function renderAll() {
      renderClasses();
      renderItems();
      renderDetails();
    }

    loadP0DataFromSheet();
  </script>
</body>
</html>
