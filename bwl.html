<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Blackwing Lair</title>

  <style>
    :root{
      --gold:#facc15;
      --gold-soft:rgba(250,204,21,.18);
      --blue:#60a5fa;
      --blue-soft:rgba(96,165,250,.18);
      --bg:#08111f;
      --panel:rgba(12,18,32,.82);
      --panel-strong:rgba(15,23,42,.92);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.11);
      --shadow:0 22px 55px rgba(0,0,0,.48);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(8,17,31,.78), rgba(8,17,31,.92)),
        url('https://cdn.discordapp.com/attachments/1470114311794987201/1505009929394851981/Screenshot_2026-03-04_231132.jpeg?ex=6a091138&is=6a07bfb8&hm=a1ec0a102aa2326db202409acb16c86f8cb9a702be6ef1507c8f420e0635c669');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
    }

    .page{
      min-height:100vh;
      backdrop-filter:blur(3px);
      padding:28px 24px 70px;
    }

    .topbar{
      width:min(1500px,100%);
      margin:0 auto 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:46px;
      padding:0 18px;
      border-radius:999px;
      color:var(--gold);
      text-decoration:none;
      font-weight:900;
      background:rgba(12,18,32,.78);
      border:1px solid rgba(250,204,21,.25);
      box-shadow:0 10px 28px rgba(0,0,0,.35);
      transition:.18s ease;
    }

    .back:hover{
      transform:translateY(-2px);
      border-color:rgba(250,204,21,.55);
      background:rgba(250,204,21,.10);
    }

    .status-pill{
      padding:12px 16px;
      border-radius:999px;
      color:#dbeafe;
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(12,18,32,.78);
      border:1px solid rgba(96,165,250,.22);
      box-shadow:0 10px 28px rgba(0,0,0,.28);
    }

    .hero{
      width:min(1500px,100%);
      margin:0 auto 34px;
      position:relative;
      overflow:visible;
      min-height:330px;
      border-radius:34px;
      border:1px solid rgba(250,204,21,.22);
      background:
        linear-gradient(120deg, rgba(8,17,31,.88), rgba(30,64,175,.42)),
        url('https://cdn.discordapp.com/attachments/1499098348865720360/1505187637038682184/bwl.jpg?ex=6a09b6b9&is=6a086539&hm=5b32e3c77ee26a60418ae1e7c2597e6bf465e2b323813fe896751a0d8f85b439');
      background-size:cover;
      background-position:center;
      box-shadow:var(--shadow);
      display:flex;
      align-items:flex-end;
    }

    .hero::after{
      content:'';
      position:absolute;
      inset:0;
      border-radius:34px;
      background:
        radial-gradient(circle at 15% 20%, rgba(250,204,21,.22), transparent 30%),
        linear-gradient(to top, rgba(8,17,31,.98), rgba(8,17,31,.15));
      pointer-events:none;
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:38px;
      width:100%;
      display:flex;
      align-items:flex-end;
      gap:24px;
    }

    .hero-icon{
      width:150px;
      height:150px;
      flex:0 0 auto;
      border-radius:50%;
      object-fit:cover;
      border:4px solid var(--gold);
      background:#111827;
      box-shadow:
        0 0 35px rgba(250,204,21,.38),
        0 18px 45px rgba(0,0,0,.55);
    }

    .hero-text h1{
      font-size:clamp(36px,5vw,70px);
      line-height:1;
      font-weight:950;
      letter-spacing:.4px;
      text-shadow:0 0 24px rgba(250,204,21,.28);
    }

    .hero-text p{
      margin-top:14px;
      max-width:780px;
      color:#dbeafe;
      line-height:1.65;
      font-size:16px;
      font-weight:650;
    }

    .hero-tags{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .tag{
      padding:8px 12px;
      border-radius:999px;
      color:#f8fafc;
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(250,204,21,.13);
      border:1px solid rgba(250,204,21,.22);
    }

    .hero-search{
      position:relative;
      margin-top:20px;
      width:min(680px,100%);
    }

    #globalSearch{
      width:100%;
      padding:15px 18px;
      border-radius:18px;
      border:1px solid rgba(250,204,21,.34);
      background:rgba(8,17,31,.88);
      color:var(--text);
      font-size:16px;
      font-weight:850;
      box-shadow:0 12px 28px rgba(0,0,0,.34);
    }

    #globalSearch::placeholder{
      color:rgba(203,213,225,.78);
    }

    #globalSearch:focus{
      outline:none;
      border-color:rgba(250,204,21,.78);
      box-shadow:0 0 0 3px rgba(250,204,21,.18), 0 12px 28px rgba(0,0,0,.42);
    }

    .search-results{
      display:none;
      position:absolute;
      left:0;
      right:0;
      top:calc(100% + 10px);
      z-index:30;
      max-height:360px;
      overflow:auto;
      padding:10px;
      border-radius:18px;
      background:rgba(12,18,32,.98);
      border:1px solid rgba(255,255,255,.13);
      box-shadow:0 22px 45px rgba(0,0,0,.58);
      backdrop-filter:blur(14px);
    }

    .search-result-btn{
      width:100%;
      display:block;
      margin:6px 0;
      padding:12px 14px;
      border:0;
      border-radius:14px;
      cursor:pointer;
      text-align:left;
      color:var(--text);
      background:rgba(255,255,255,.06);
      font-weight:950;
      transition:.16s ease;
    }

    .search-result-btn:hover{
      background:rgba(250,204,21,.14);
      transform:translateX(3px);
    }

    .search-small{
      display:block;
      margin-top:4px;
      color:#cbd5e1;
      font-size:12px;
      font-weight:750;
      line-height:1.35;
    }

    .search-empty{
      padding:12px 14px;
      color:var(--muted);
      font-weight:800;
      line-height:1.45;
    }

    .layout{
      width:min(1500px,100%);
      margin:auto;
      display:grid;
      grid-template-columns:260px minmax(360px,1fr) minmax(400px,1.1fr);
      gap:24px;
      align-items:start;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }

    .panel-head{
      padding:20px 20px 0;
    }

    .panel-title{
      color:var(--gold);
      font-size:14px;
      letter-spacing:.15em;
      text-transform:uppercase;
      font-weight:950;
    }

    .slots{
      padding:18px;
      display:grid;
      gap:10px;
    }

    .slot-btn{
      width:100%;
      padding:14px 15px;
      border:0;
      cursor:pointer;
      border-radius:16px;
      color:var(--text);
      text-align:left;
      font-size:15px;
      font-weight:900;
      background:linear-gradient(135deg, rgba(37,56,91,.98), rgba(16,25,45,.98));
      border-left:5px solid rgba(250,204,21,.58);
      box-shadow:0 8px 22px rgba(0,0,0,.26);
      transition:.16s ease;
    }

    .slot-btn:hover,
    .slot-btn.active{
      transform:translateX(5px);
      background:linear-gradient(135deg, rgba(59,86,135,.98), rgba(25,39,68,.98));
      box-shadow:0 0 0 3px rgba(250,204,21,.20), 0 12px 28px rgba(0,0,0,.32);
    }

    .items-panel{
      padding:20px;
    }

    .items-title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }

    .item-count{
      color:#dbeafe;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.10em;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(96,165,250,.12);
      border:1px solid rgba(96,165,250,.18);
      white-space:nowrap;
    }

    .items{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
    }

    .item-card{
      min-height:118px;
      padding:18px;
      border:0;
      cursor:pointer;
      border-radius:22px;
      color:var(--text);
      text-align:left;
      background:
        radial-gradient(circle at top left, rgba(250,204,21,.13), transparent 35%),
        linear-gradient(180deg, rgba(37,56,91,.98), rgba(16,25,45,.98));
      border:1px solid rgba(255,255,255,.11);
      box-shadow:0 12px 28px rgba(0,0,0,.28);
      transition:.18s ease;
      position:relative;
      overflow:hidden;
    }

    .item-card::before{
      content:'✦';
      color:var(--gold);
      font-size:18px;
      position:absolute;
      right:16px;
      top:14px;
      opacity:.9;
    }

    .item-card:hover,
    .item-card.active{
      transform:translateY(-4px);
      border-color:rgba(250,204,21,.42);
      box-shadow:0 0 0 2px rgba(250,204,21,.18), 0 18px 38px rgba(0,0,0,.42);
    }

    .item-name{
      display:block;
      padding-right:24px;
      font-size:17px;
      font-weight:950;
      line-height:1.28;
    }

    .item-meta{
      display:block;
      margin-top:12px;
      color:#dbeafe;
      font-size:12px;
      font-weight:800;
      line-height:1.45;
      opacity:.9;
    }

    .details{
      padding:24px;
      min-height:610px;
      background:
        radial-gradient(circle at top left, rgba(250,204,21,.10), transparent 30%),
        var(--panel-strong);
    }

    .details-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      padding-bottom:18px;
      margin-bottom:18px;
      border-bottom:1px solid rgba(250,204,21,.18);
    }

    .details h2{
      color:var(--gold);
      font-size:clamp(25px,3vw,38px);
      line-height:1.12;
      font-weight:950;
    }

    .wowhead-link{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      color:var(--gold);
      text-decoration:none;
      border:1px solid rgba(250,204,21,.35);
      background:rgba(250,204,21,.08);
      font-size:13px;
      font-weight:950;
      transition:.16s ease;
    }

    .wowhead-link:hover{
      background:rgba(250,204,21,.16);
      transform:translateY(-2px);
    }

    .eligible{
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:18px;
      color:#dbeafe;
      font-size:14px;
      line-height:1.45;
      background:rgba(96,165,250,.09);
      border:1px solid rgba(96,165,250,.16);
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:18px;
      background:rgba(255,255,255,.035);
    }

    th{
      padding:14px 13px;
      background:linear-gradient(90deg, rgba(250,204,21,.28), rgba(96,165,250,.18));
      color:var(--text);
      text-align:left;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    td{
      padding:15px 13px;
      border-bottom:1px solid rgba(255,255,255,.09);
      color:var(--muted);
      font-weight:800;
    }

    tr:last-child td{
      border-bottom:0;
    }

    .prio-badge{
      display:inline-flex;
      min-width:42px;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      color:var(--gold);
      background:rgba(250,204,21,.10);
      border:1px solid rgba(250,204,21,.24);
      font-weight:950;
    }

    .empty{
      padding:20px;
      border:1px dashed rgba(250,204,21,.32);
      border-radius:20px;
      color:var(--muted);
      background:rgba(250,204,21,.055);
      line-height:1.55;
      font-weight:800;
    }

    @media(max-width:1180px){
      .layout{
        grid-template-columns:1fr;
      }

      .hero-content{
        align-items:center;
      }
    }

    @media(max-width:700px){
      .page{
        padding:18px 14px 50px;
      }

      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .hero{
        min-height:460px;
        border-radius:26px;
      }

      .hero::after{
        border-radius:26px;
      }

      .hero-content{
        flex-direction:column;
        align-items:flex-start;
        padding:26px;
      }

      .hero-icon{
        width:116px;
        height:116px;
      }

      .search-results{
        position:relative;
        top:auto;
      }

      .items{
        grid-template-columns:1fr;
      }

      .details-header{
        display:block;
      }

      .wowhead-link{
        margin-top:14px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <a class="back" href="index.html">← Zur Startseite</a>
      <div class="status-pill">Blackwing Lair · Prio 0 Plus</div>
    </div>

    <section class="hero">
      <div class="hero-content">
        <img
          class="hero-icon"
          src="https://cdn.discordapp.com/attachments/1499098348865720360/1505187637038682184/bwl.jpg?ex=6a09b6b9&is=6a086539&hm=5b32e3c77ee26a60418ae1e7c2597e6bf465e2b323813fe896751a0d8f85b439"
          alt="BWL Icon"
        />

        <div class="hero-text">
          <h1>Blackwing Lair</h1>

          <div class="hero-tags">
            <span class="tag">BWL</span>
            <span class="tag">Sheet Sync</span>
            <span class="tag">Prio 0 Plus</span>
          </div>

          <div class="hero-search">
            <input
              id="globalSearch"
              type="text"
              placeholder="Item oder Spieler suchen ..."
              autocomplete="off"
            />
            <div id="searchResults" class="search-results"></div>
          </div>
        </div>
      </div>
    </section>

    <main class="layout">
      <section class="panel slots" id="slotButtons" aria-label="Ausrüstungsslots"></section>

      <section class="panel items-panel" aria-label="Items">
        <div class="items-title-row">
          <h2 class="panel-title" id="itemsTitle">Items</h2>
          <div class="item-count" id="itemCount">0 Items</div>
        </div>
        <div class="items" id="itemButtons"></div>
      </section>

      <section class="panel details" aria-label="P0-Liste">
        <div class="details-header">
          <h2 id="itemTitle">Item auswählen</h2>
          <a id="wowheadLink" class="wowhead-link" href="#" target="_blank" rel="noopener">Wowhead</a>
        </div>
        <div class="eligible" id="eligibleClasses"></div>
        <div id="itemContent"></div>
      </section>
    </main>

  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/export?format=csv&gid=1857830583";
    const CURRENT_RAID = "BWL";

    const preferredSlotOrder = [
      "Kopf", "Hals", "Schulter", "Rücken", "Brust", "Handgelenke", "Hände",
      "Taille", "Beine", "Füße", "Finger", "Schmuck", "Schmuckstück", "Waffe", "Distanzwaffe"
    ];

    const wowheadLinks = {
      "Neltharions Träne": "https://www.wowhead.com/classic/item=19379/neltharions-tear",
      "Mantel der Pechschwingenkabale": "https://www.wowhead.com/classic/item=19370/mantle-of-the-blackwing-cabal",
      "Stiefel des reinen Gedankens": "https://www.wowhead.com/classic/item=19437/boots-of-pure-thought",
      "Edelstein des Gedankensprungs": "https://www.wowhead.com/classic/item=19339/mind-quickening-gem",
      "Maladath, Runenverzierte Klinge des schwarzen Drachenschwarms": "https://www.wowhead.com/classic/item=19351/maladath-runed-blade-of-the-black-flight",
      "Armschienen der arkanen Präzision": "https://www.wowhead.com/classic/item=19374/bracers-of-arcane-accuracy",
      "Band der dunklen Herrschaft": "https://www.wowhead.com/classic/item=19434/band-of-dark-dominion",
      "Ringos Blizzardstiefel": "https://www.wowhead.com/classic/item=19438/ringos-blizzard-boots",
      "Ebenholzfarbene Flammenhandschuhe": "https://www.wowhead.com/classic/item=19407/ebony-flame-gloves",
      "Edelstein der Verjüngung": "https://www.wowhead.com/classic/item=19395/rejuvenating-gem",
      "Drachenfangzahn-Talisman": "https://www.wowhead.com/classic/item=19406/drake-fang-talisman",
      "Band der erzwungenen Konzentration": "https://www.wowhead.com/classic/item=19403/band-of-forced-concentration",
      "Schleier des reinen Gedankens": "https://www.wowhead.com/classic/item=19430/shroud-of-pure-thought",
      "Gehärteter Drachenledergürtel": "https://www.wowhead.com/classic/item=19396/taut-dragonhide-belt",
      "Malfurions gesegnetes Bollwerk": "https://www.wowhead.com/classic/item=19405/malfurions-blessed-bulwark",
      "Angelistas Gespür": "https://www.wowhead.com/classic/item=19388/angelistas-grasp",
      "Energieerfüllte Gamaschen": "https://www.wowhead.com/classic/item=19385/empowered-leggings",
      "Chromatische Stiefel": "https://www.wowhead.com/classic/item=19387/chromatic-boots",
      "Ashjre'thul, Armbrust der Pein": "https://www.wowhead.com/classic/item=19361/ashjrethul-crossbow-of-smiting",
      "Chromatisch gehärtetes Schwert": "https://www.wowhead.com/classic/item=19352/chromatically-tempered-sword",
      "Lok'amir il Romathis": "https://www.wowhead.com/classic/item=19360/lokamir-il-romathis",
      "Stab der Schattenflamme": "https://www.wowhead.com/classic/item=19356/staff-of-the-shadow-flame",
      "Mish'undare, Reif des Gedankenschinders": "https://www.wowhead.com/classic/item=19375/mishundare-circlet-of-the-mind-flayer",
      "Prestors Talisman der Verschwörung": "https://www.wowhead.com/classic/item=19377/prestors-talisman-of-connivery",
      "Umhang des Brutlords": "https://www.wowhead.com/classic/item=19378/cloak-of-the-brood-lord",
      "Stiefel der Schattenflamme": "https://www.wowhead.com/classic/item=19381/boots-of-the-shadow-flame",
      "Band aus reinem Elementium": "https://www.wowhead.com/classic/item=19382/pure-elementium-band"
    };

    let rowsFromSheet = [];
    let selectedSlot = "";
    let selectedItem = "";

    function normalizeHeader(text){
      return String(text || "")
        .toLowerCase()
        .replace(/ä/g,"ae")
        .replace(/ö/g,"oe")
        .replace(/ü/g,"ue")
        .replace(/ß/g,"ss")
        .replace(/\s+/g,"")
        .trim();
    }

    function normalizeSearch(text){
      return String(text || "")
        .toLowerCase()
        .replace(/ä/g,"ae")
        .replace(/ö/g,"oe")
        .replace(/ü/g,"ue")
        .replace(/ß/g,"ss")
        .trim();
    }

    function getField(row,names){
      for(const name of names){
        if(row[name] !== undefined) return row[name];
      }
      return "";
    }

    function escapeHTML(value){
      return String(value || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    async function loadRowsFromSheet(){
      try{
        const separator = SHEET_CSV_URL.includes("?") ? "&" : "?";
        const response = await fetch(SHEET_CSV_URL + separator + "cachebust=" + Date.now());
        const csvText = await response.text();
        const table = parseCSV(csvText);

        if(!table.length) return;

        const headers = table.shift().map(header => normalizeHeader(header));

        rowsFromSheet = table.map(row => {
          const obj = {};
          headers.forEach((header,index) => {
            obj[header] = (row[index] || "").trim();
          });
          return obj;
        }).filter(row => {
          const raid = getField(row,["raid"]);
          const item = getField(row,["item"]);
          const slot = getField(row,["slot","platz","ausruestungsslot"]);
          return item && slot && (!raid || raid.toLowerCase() === CURRENT_RAID.toLowerCase());
        });

        const slots = getSlots();
        selectedSlot = slots[0] || "";
        selectedItem = selectedSlot ? getItemsBySlot(selectedSlot)[0] : "";
      }catch(error){
        console.error("Fehler beim Laden der Google-Sheet-Daten:", error);
      }
    }

    function getSlots(){
      const slots = [...new Set(rowsFromSheet.map(row => getField(row,["slot","platz","ausruestungsslot"])))].filter(Boolean);

      return slots.sort((a,b) => {
        const aIndex = preferredSlotOrder.indexOf(a);
        const bIndex = preferredSlotOrder.indexOf(b);
        if(aIndex === -1 && bIndex === -1) return a.localeCompare(b);
        if(aIndex === -1) return 1;
        if(bIndex === -1) return -1;
        return aIndex - bIndex;
      });
    }

    function getItemsBySlot(slot){
      return [...new Set(
        rowsFromSheet
          .filter(row => getField(row,["slot","platz","ausruestungsslot"]) === slot)
          .map(row => getField(row,["item"]))
          .filter(Boolean)
      )];
    }

    function getEligibleClasses(item){
      return [...new Set(
        rowsFromSheet
          .filter(row => getField(row,["item"]) === item)
          .map(row => getField(row,["klasse","class"]))
          .filter(Boolean)
      )];
    }

    function getP0Entries(item){
      return rowsFromSheet
        .filter(row => getField(row,["item"]) === item)
        .map(row => ({
          spieler:getField(row,["spieler","player","name"]),
          klasse:getField(row,["klasse","class"]),
          anzahl:getField(row,["anzahl","p0","prio","count"]) || "1"
        }))
        .filter(entry => entry.spieler);
    }

    function parseCSV(text){
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;
      const delimiter = detectDelimiter(text);

      for(let i=0;i<text.length;i++){
        const char = text[i];
        const nextChar = text[i+1];

        if(char === '"' && insideQuotes && nextChar === '"'){
          currentValue += '"';
          i++;
        }else if(char === '"'){
          insideQuotes = !insideQuotes;
        }else if(char === delimiter && !insideQuotes){
          currentRow.push(currentValue);
          currentValue = "";
        }else if((char === "\n" || char === "\r") && !insideQuotes){
          if(currentValue || currentRow.length){
            currentRow.push(currentValue);
            rows.push(currentRow);
          }
          currentRow = [];
          currentValue = "";
          if(char === "\r" && nextChar === "\n") i++;
        }else{
          currentValue += char;
        }
      }

      if(currentValue || currentRow.length){
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      return rows;
    }

    function detectDelimiter(text){
      const firstLine = text.split(/\r?\n/)[0] || "";
      const commas = (firstLine.match(/,/g) || []).length;
      const semicolons = (firstLine.match(/;/g) || []).length;
      return semicolons > commas ? ";" : ",";
    }

    function renderSlots(){
      const wrapper = document.getElementById("slotButtons");
      const slots = getSlots();

      if(!slots.length){
        wrapper.innerHTML = '<div class="panel-head"><h2 class="panel-title">Slot wählen</h2></div><div class="slots"><div class="empty">Keine BWL-Daten im Sheet gefunden.</div></div>';
        return;
      }

      wrapper.innerHTML = '<div class="panel-head"><h2 class="panel-title">Slot wählen</h2></div><div class="slots">' + slots.map(slot => `
        <button class="slot-btn ${slot === selectedSlot ? "active" : ""}" onclick="selectSlot('${escapeHTML(slot)}')">${escapeHTML(slot)}</button>
      `).join("") + '</div>';
    }

    function renderItems(){
      const items = selectedSlot ? getItemsBySlot(selectedSlot) : [];
      document.getElementById("itemsTitle").textContent = selectedSlot ? selectedSlot + " · BWL Items" : "BWL Items";
      document.getElementById("itemCount").textContent = items.length === 1 ? "1 Item" : items.length + " Items";

      const wrapper = document.getElementById("itemButtons");

      if(!items.length){
        wrapper.innerHTML = '<div class="empty">Für diesen Slot gibt es aktuell keine Items im Sheet.</div>';
        return;
      }

      wrapper.innerHTML = items.map(item => `
        <button class="item-card ${item === selectedItem ? "active" : ""}" onclick="selectItemByValue(this.dataset.item)" data-item="${escapeHTML(item)}">
          <span class="item-name">${escapeHTML(item)}</span>
          <span class="item-meta">${escapeHTML(getEligibleClasses(item).join(", "))}</span>
        </button>
      `).join("");
    }

    function renderDetails(){
      const title = document.getElementById("itemTitle");
      const eligible = document.getElementById("eligibleClasses");
      const content = document.getElementById("itemContent");
      const link = document.getElementById("wowheadLink");

      if(!selectedItem){
        title.textContent = "Item auswählen";
        eligible.innerHTML = "";
        content.innerHTML = '<div class="empty">Bitte wähle links einen Slot und anschließend ein Item aus.</div>';
        link.style.display = "none";
        return;
      }

      title.textContent = selectedItem;
      eligible.innerHTML = `<strong>Klassen:</strong> ${escapeHTML(getEligibleClasses(selectedItem).join(", ") || "—")}`;

      if(wowheadLinks[selectedItem]){
        link.href = wowheadLinks[selectedItem];
        link.style.display = "inline-flex";
      }else{
        link.style.display = "none";
      }

      const entries = getP0Entries(selectedItem);

      if(!entries.length){
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>P0+</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${escapeHTML(entry.spieler)}</td>
                <td>${escapeHTML(entry.klasse)}</td>
                <td><span class="prio-badge">${escapeHTML(entry.anzahl)}x</span></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function selectSlot(slot){
      selectedSlot = slot;
      selectedItem = getItemsBySlot(slot)[0] || "";
      renderAll();
    }

    function selectItem(itemName){
      selectedItem = itemName;
      renderAll();
    }

    function selectItemByValue(itemName){
      selectItem(itemName);
    }

    function findSlotByItem(item){
      const row = rowsFromSheet.find(row => getField(row,["item"]) === item);
      return row ? getField(row,["slot","platz","ausruestungsslot"]) : "";
    }

    function jumpToItem(item){
      const slot = findSlotByItem(item);
      if(!slot) return;

      selectedSlot = slot;
      selectedItem = item;
      renderAll();
      closeSearchResults();

      const details = document.querySelector(".details");
      if(details){
        details.scrollIntoView({ behavior:"smooth", block:"start" });
      }
    }

    function getSearchEntries(){
      const itemEntries = [...new Set(
        rowsFromSheet
          .map(row => getField(row,["item"]))
          .filter(Boolean)
      )].map(item => ({
        type:"item",
        label:item,
        item:item,
        meta:"Item auswählen · " + (getEligibleClasses(item).join(", ") || "Klassen offen")
      }));

      const playerEntries = rowsFromSheet
        .map(row => ({
          type:"player",
          spieler:getField(row,["spieler","player","name"]),
          klasse:getField(row,["klasse","class"]),
          item:getField(row,["item"]),
          slot:getField(row,["slot","platz","ausruestungsslot"]),
          anzahl:getField(row,["anzahl","p0","prio","count"]) || "1"
        }))
        .filter(entry => entry.spieler && entry.item)
        .map(entry => ({
          type:"player",
          label:entry.spieler + " → " + entry.item,
          item:entry.item,
          meta:[entry.klasse, entry.slot, "P0+ " + entry.anzahl + "x"].filter(Boolean).join(" · ")
        }));

      return [...itemEntries, ...playerEntries];
    }

    function renderGlobalSearch(){
      const input = document.getElementById("globalSearch");
      const results = document.getElementById("searchResults");
      if(!input || !results) return;

      const query = normalizeSearch(input.value);

      if(!query){
        closeSearchResults();
        return;
      }

      const matches = getSearchEntries()
        .filter(entry => normalizeSearch(entry.label + " " + entry.meta).includes(query))
        .slice(0,18);

      if(!matches.length){
        results.innerHTML = '<div class="search-empty">Keine Treffer gefunden.</div>';
        results.style.display = "block";
        return;
      }

      results.innerHTML = matches.map((entry,index) => `
        <button class="search-result-btn" type="button" data-search-index="${index}">
          ${escapeHTML(entry.label)}
          <span class="search-small">${escapeHTML(entry.meta)}</span>
        </button>
      `).join("");

      results.querySelectorAll(".search-result-btn").forEach((button,index) => {
        button.addEventListener("click", () => {
          const entry = matches[index];
          jumpToItem(entry.item);
        });
      });

      results.style.display = "block";
    }

    function closeSearchResults(){
      const results = document.getElementById("searchResults");
      if(results){
        results.style.display = "none";
        results.innerHTML = "";
      }
    }

    function setupGlobalSearch(){
      const input = document.getElementById("globalSearch");
      if(!input) return;

      input.addEventListener("input", renderGlobalSearch);
      input.addEventListener("keydown", event => {
        if(event.key === "Escape"){
          input.value = "";
          closeSearchResults();
        }
      });

      document.addEventListener("click", event => {
        const searchBox = document.querySelector(".hero-search");
        if(searchBox && !searchBox.contains(event.target)){
          closeSearchResults();
        }
      });
    }

    function renderAll(){
      renderSlots();
      renderItems();
      renderDetails();
    }

    loadRowsFromSheet().then(() => {
      renderAll();
      setupGlobalSearch();
    });
  </script>
</body>
</html>
