<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Blackwing Lair</title>
  <style>
    :root {
      --bg: #08111f;
      --bg2: #111c33;
      --panel: rgba(20, 32, 55, 0.92);
      --gold: #facc15;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.13);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.22), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    header {
      position: relative;
      min-height: 110px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      padding: 18px 24px;
      background:
        linear-gradient(90deg, rgba(8, 17, 31, 0.98), rgba(30, 64, 175, 0.88), rgba(8, 17, 31, 0.98));
      border-bottom: 1px solid rgba(250, 204, 21, 0.32);
      box-shadow: var(--shadow);
    }

    .back {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      font-size: 34px;
      border: 1px solid rgba(250, 204, 21, 0.35);
      background: rgba(255, 255, 255, 0.04);
    }

    .headline { text-align: center; }

    .headline h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: 0.3px;
      text-shadow: 0 0 18px rgba(250, 204, 21, 0.25);
    }

    .headline p {
      margin: 8px 0 0;
      color: #dbeafe;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    main {
      width: min(1580px, calc(100% - 32px));
      margin: 28px auto 52px;
      display: grid;
      grid-template-columns: 235px 1fr 1.05fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .slots {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .panel-title {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .slot-btn,
    .item-btn {
      border: 0;
      cursor: pointer;
      font-weight: 800;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .slot-btn {
      padding: 13px 14px;
      border-radius: 13px;
      color: var(--text);
      font-size: 16px;
      text-align: left;
      background: linear-gradient(180deg, rgba(37, 56, 91, 0.98), rgba(22, 34, 58, 0.98));
      border-left: 5px solid rgba(250,204,21,.7);
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
    }

    .slot-btn:hover,
    .slot-btn.active {
      transform: translateX(5px);
      box-shadow: 0 0 0 3px rgba(250,204,21,.25), 0 10px 22px rgba(0,0,0,.28);
      background: linear-gradient(180deg, rgba(59, 86, 135, 0.98), rgba(30, 47, 79, 0.98));
    }

    .items-panel { padding: 18px; }

    .items {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .item-btn {
      min-height: 60px;
      padding: 13px 16px;
      border-radius: 16px;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(37, 56, 91, 0.98), rgba(22, 34, 58, 0.98));
      border: 1px solid rgba(255,255,255,.11);
      border-left: 5px solid var(--gold);
      text-align: left;
      line-height: 1.25;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    .item-btn::before {
      content: "✦";
      color: var(--gold);
      margin-right: 8px;
    }

    .item-btn:hover,
    .item-btn.active {
      background:
        linear-gradient(180deg, rgba(59, 86, 135, 0.98), rgba(30, 47, 79, 0.98));
      box-shadow: 0 0 0 2px rgba(250,204,21,.28), 0 13px 28px rgba(0,0,0,.30);
      transform: translateY(-2px);
    }

    .item-meta {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .details {
      padding: 22px;
      min-height: 640px;
      background:
        linear-gradient(180deg, rgba(30,41,59,.96), rgba(15,23,42,.97));
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(250,204,21,.18);
    }

    .details h2 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.15;
    }

    .wowhead-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(250,204,21,.08);
      font-size: 14px;
      font-weight: 800;
    }

    .wowhead-link:hover { background: rgba(250,204,21,.16); }

    .eligible {
      margin: -4px 0 16px;
      color: #dbeafe;
      font-size: 14px;
      line-height: 1.45;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,255,255,.035);
    }

    th {
      padding: 12px 11px;
      background: linear-gradient(90deg, rgba(250,204,21,.28), rgba(96,165,250,.18));
      color: var(--text);
      text-align: left;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    td {
      padding: 13px 11px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      color: var(--muted);
      font-weight: 750;
    }

    tr:last-child td { border-bottom: 0; }

    .empty {
      padding: 18px;
      border: 1px dashed rgba(250,204,21,.32);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(250,204,21,.055);
      line-height: 1.5;
      font-weight: 700;
    }

    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(96,165,250,.08);
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid rgba(96,165,250,.18);
    }

    @media (max-width: 1120px) {
      main { grid-template-columns: 1fr; }
      .items { grid-template-columns: 1fr; }
      .details { min-height: auto; }
    }

    @media (max-width: 620px) {
      header { grid-template-columns: 52px 1fr 20px; padding: 14px; }
      .back { width: 42px; height: 42px; }
      main { width: min(100% - 20px, 1580px); gap: 16px; }
      .details-header { display: block; }
      .wowhead-link { margin-top: 12px; }
    }
  </style>
</head>

    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/export?format=csv&gid=0";

    let p0Data = {};
    let selectedSlot = "Kopf";
    let selectedItem = "Mish'undare, Reif des Gedankenschinders";

    function getItemsBySlot(slot) {
      const items = [];
      itemRows
        .filter(row => row.slot === slot)
        .forEach(row => {
          if (!items.includes(row.item)) items.push(row.item);
        });
      return items;
    }

    function getEligibleClasses(item) {
      const classes = [];
      itemRows
        .filter(row => row.item === item)
        .forEach(row => {
          if (!classes.includes(row.klasse)) classes.push(row.klasse);
        });
      return classes;
    }

    async function loadP0DataFromSheet() {
      try {
        const response = await fetch(SHEET_CSV_URL + "&cachebust=" + Date.now());
        const csvText = await response.text();
        const rows = parseCSV(csvText);

        if (!rows.length) return;

        const header = rows.shift().map(h => h.trim().toLowerCase());
        const raidIndex = header.indexOf("raid");
        const klasseIndex = header.indexOf("klasse");
        const itemIndex = header.indexOf("item");
        const spielerIndex = header.indexOf("spieler");
        const anzahlIndex = header.indexOf("anzahl");

        rows.forEach(row => {
          const raid = raidIndex >= 0 ? row[raidIndex]?.trim() : "BWL";
          const klasse = row[klasseIndex]?.trim();
          const itemRaw = row[itemIndex]?.trim();
          const spieler = row[spielerIndex]?.trim();
          const anzahl = row[anzahlIndex]?.trim() || "1";

          if (!klasse || !itemRaw || !spieler) return;
          if (raid && raid.toLowerCase() !== "bwl") return;

          const item = findMatchingItemName(itemRaw);

          if (!p0Data[item]) p0Data[item] = [];
          p0Data[item].push({ spieler, klasse, anzahl });
        });
      } catch (error) {
        console.error("Fehler beim Laden der Google-Sheet-Daten:", error);
      }
    }

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue);
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (currentValue || currentRow.length) {
            currentRow.push(currentValue);
            rows.push(currentRow);
          }
          currentRow = [];
          currentValue = "";
          if (char === "\r" && nextChar === "\n") i++;
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      return rows;
    }

    function renderItems() {
      document.getElementById("itemsTitle").textContent = selectedSlot + " · BWL Items";
      const wrapper = document.getElementById("itemButtons");
      const items = getItemsBySlot(selectedSlot);

      wrapper.innerHTML = items.map(item => {
        const classes = getEligibleClasses(item).join(", ");

          <button class="item-btn ${item === selectedItem ? "active" : ""}" onclick="selectItem(\`${item}\`)">
            ${item}
            <span class="item-meta">${classes}</span>
          </button>
        `;
      }).join("");
    }

        link.href = wowhead;
        link.style.display = "inline-flex";
      } else {
        link.style.display = "none";
      }

      const entries = p0Data[selectedItem] || [];
      const content = document.getElementById("itemContent");

      if (entries.length === 0) {
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>P0 gesetzt</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${entry.spieler}</td>
                <td>${entry.klasse}</td>
                <td>${entry.anzahl}x</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function selectSlot(slot) {
      selectedSlot = slot;
      selectedItem = getItemsBySlot(slot)[0] || "";
      renderAll();
    }

    function selectItem(itemName) {
      selectedItem = itemName;
      renderAll();
    }

    function renderAll() {
      renderSlots();
      renderItems();
      renderDetails();
    }

    loadP0DataFromSheet().then(() => renderAll());
  </script>
</body>
</html>
