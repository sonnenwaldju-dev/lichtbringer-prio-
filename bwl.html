<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Blackwing Lair</title>
  <style>
    :root {
      --bg: #08111f;
      --bg2: #111c33;
      --panel: rgba(20, 32, 55, 0.92);
      --gold: #facc15;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.13);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.22), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    header {
      min-height: 110px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      padding: 18px 24px;
      background: linear-gradient(90deg, rgba(8,17,31,.98), rgba(30,64,175,.88), rgba(8,17,31,.98));
      border-bottom: 1px solid rgba(250,204,21,.32);
      box-shadow: var(--shadow);
    }

    .back {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      font-size: 34px;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(255,255,255,.04);
    }

    .headline { text-align: center; }

    .headline h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 42px);
      font-weight: 900;
      text-shadow: 0 0 18px rgba(250,204,21,.25);
    }

    .headline p {
      margin: 8px 0 0;
      color: #dbeafe;
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    main {
      width: min(1580px, calc(100% - 32px));
      margin: 28px auto 52px;
      display: grid;
      grid-template-columns: 235px 1fr 1.05fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .slots {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .panel-title {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .slot-btn,
    .item-btn {
      border: 0;
      cursor: pointer;
      font-weight: 800;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .slot-btn {
      padding: 13px 14px;
      border-radius: 13px;
      color: var(--text);
      font-size: 16px;
      text-align: left;
      background: linear-gradient(180deg, rgba(37,56,91,.98), rgba(22,34,58,.98));
      border-left: 5px solid rgba(250,204,21,.7);
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
    }

    .slot-btn:hover,
    .slot-btn.active {
      transform: translateX(5px);
      box-shadow: 0 0 0 3px rgba(250,204,21,.25), 0 10px 22px rgba(0,0,0,.28);
      background: linear-gradient(180deg, rgba(59,86,135,.98), rgba(30,47,79,.98));
    }

    .items-panel { padding: 18px; }

    .items {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .item-btn {
      min-height: 60px;
      padding: 13px 16px;
      border-radius: 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(37,56,91,.98), rgba(22,34,58,.98));
      border: 1px solid rgba(255,255,255,.11);
      border-left: 5px solid var(--gold);
      text-align: left;
      line-height: 1.25;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    .item-btn::before {
      content: "✦";
      color: var(--gold);
      margin-right: 8px;
    }

    .item-btn:hover,
    .item-btn.active {
      background: linear-gradient(180deg, rgba(59,86,135,.98), rgba(30,47,79,.98));
      box-shadow: 0 0 0 2px rgba(250,204,21,.28), 0 13px 28px rgba(0,0,0,.30);
      transform: translateY(-2px);
    }

    .item-meta {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .details {
      padding: 22px;
      min-height: 640px;
      background: linear-gradient(180deg, rgba(30,41,59,.96), rgba(15,23,42,.97));
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(250,204,21,.18);
    }

    .details h2 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.15;
    }

    .wowhead-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(250,204,21,.08);
      font-size: 14px;
      font-weight: 800;
    }

    .eligible {
      margin: -4px 0 16px;
      color: #dbeafe;
      font-size: 14px;
      line-height: 1.45;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,255,255,.035);
    }

    th {
      padding: 12px 11px;
      background: linear-gradient(90deg, rgba(250,204,21,.28), rgba(96,165,250,.18));
      color: var(--text);
      text-align: left;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    td {
      padding: 13px 11px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      color: var(--muted);
      font-weight: 750;
    }

    tr:last-child td { border-bottom: 0; }

    .empty {
      padding: 18px;
      border: 1px dashed rgba(250,204,21,.32);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(250,204,21,.055);
      line-height: 1.5;
      font-weight: 700;
    }

    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(96,165,250,.08);
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid rgba(96,165,250,.18);
    }

    @media (max-width: 1120px) {
      main { grid-template-columns: 1fr; }
      .items { grid-template-columns: 1fr; }
      .details { min-height: auto; }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="index.html">←</a>
    <div class="headline">
      <h1>✨ Lichtbringer · Prio 0 Blackwing Lair</h1>
      <p>vollautomatisch aus dem Google Sheet</p>
    </div>
    <div></div>
  </header>

  <main>
    <section class="panel slots" id="slotButtons" aria-label="Ausrüstungsslots"></section>

    <section class="panel items-panel" aria-label="Items">
      <h2 class="panel-title" id="itemsTitle">Items</h2>
      <div class="items" id="itemButtons"></div>
    </section>

    <section class="panel details" aria-label="P0-Liste">
      <div class="details-header">
        <h2 id="itemTitle">Item auswählen</h2>
        <a id="wowheadLink" class="wowhead-link" href="#" target="_blank" rel="noopener">Wowhead</a>
      </div>
      <div class="eligible" id="eligibleClasses"></div>
      <div id="itemContent"></div>
      <div class="hint">Slots, Items, Klassen, Spieler und Anzahl werden vollständig aus dem Google Sheet geladen. Neue Einträge erscheinen automatisch nach dem Aktualisieren der Seite.</div>
    </section>
  </main>

  <script>
   const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/export?format=csv&gid=1857830583";
    const CURRENT_RAID = "BWL";

    const preferredSlotOrder = [
      "Kopf", "Hals", "Schulter", "Rücken", "Brust", "Handgelenke", "Hände",
      "Taille", "Beine", "Füße", "Finger", "Schmuck", "Schmuckstück", "Waffe", "Distanzwaffe"
    ];

    const wowheadLinks = {
      "Neltharions Träne": "https://www.wowhead.com/classic/item=19379/neltharions-tear",
      "Mantel der Pechschwingenkabale": "https://www.wowhead.com/classic/item=19370/mantle-of-the-blackwing-cabal",
      "Stiefel des reinen Gedankens": "https://www.wowhead.com/classic/item=19437/boots-of-pure-thought",
      "Edelstein des Gedankensprungs": "https://www.wowhead.com/classic/item=19339/mind-quickening-gem",
      "Maladath, Runenverzierte Klinge des schwarzen Drachenschwarms": "https://www.wowhead.com/classic/item=19351/maladath-runed-blade-of-the-black-flight",
      "Armschienen der arkanen Präzision": "https://www.wowhead.com/classic/item=19374/bracers-of-arcane-accuracy",
      "Band der dunklen Herrschaft": "https://www.wowhead.com/classic/item=19434/band-of-dark-dominion",
      "Ringos Blizzardstiefel": "https://www.wowhead.com/classic/item=19438/ringos-blizzard-boots",
      "Ebenholzfarbene Flammenhandschuhe": "https://www.wowhead.com/classic/item=19407/ebony-flame-gloves",
      "Edelstein der Verjüngung": "https://www.wowhead.com/classic/item=19395/rejuvenating-gem",
      "Drachenfangzahn-Talisman": "https://www.wowhead.com/classic/item=19406/drake-fang-talisman",
      "Band der erzwungenen Konzentration": "https://www.wowhead.com/classic/item=19403/band-of-forced-concentration",
      "Schleier des reinen Gedankens": "https://www.wowhead.com/classic/item=19430/shroud-of-pure-thought",
      "Gehärteter Drachenledergürtel": "https://www.wowhead.com/classic/item=19396/taut-dragonhide-belt",
      "Malfurions gesegnetes Bollwerk": "https://www.wowhead.com/classic/item=19405/malfurions-blessed-bulwark",
      "Angelistas Gespür": "https://www.wowhead.com/classic/item=19388/angelistas-grasp",
      "Energieerfüllte Gamaschen": "https://www.wowhead.com/classic/item=19385/empowered-leggings",
      "Chromatische Stiefel": "https://www.wowhead.com/classic/item=19387/chromatic-boots",
      "Ashjre'thul, Armbrust der Pein": "https://www.wowhead.com/classic/item=19361/ashjrethul-crossbow-of-smiting",
      "Chromatisch gehärtetes Schwert": "https://www.wowhead.com/classic/item=19352/chromatically-tempered-sword",
      "Lok'amir il Romathis": "https://www.wowhead.com/classic/item=19360/lokamir-il-romathis",
      "Stab der Schattenflamme": "https://www.wowhead.com/classic/item=19356/staff-of-the-shadow-flame",
      "Mish'undare, Reif des Gedankenschinders": "https://www.wowhead.com/classic/item=19375/mishundare-circlet-of-the-mind-flayer",
      "Prestors Talisman der Verschwörung": "https://www.wowhead.com/classic/item=19377/prestors-talisman-of-connivery",
      "Umhang des Brutlords": "https://www.wowhead.com/classic/item=19378/cloak-of-the-brood-lord",
      "Stiefel der Schattenflamme": "https://www.wowhead.com/classic/item=19381/boots-of-the-shadow-flame",
      "Band aus reinem Elementium": "https://www.wowhead.com/classic/item=19382/pure-elementium-band"
    };

    let rowsFromSheet = [];
    let selectedSlot = "";
    let selectedItem = "";

    function normalizeHeader(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/ä/g, "ae")
        .replace(/ö/g, "oe")
        .replace(/ü/g, "ue")
        .replace(/ß/g, "ss")
        .replace(/\s+/g, "")
        .trim();
    }

    function getField(row, names) {
      for (const name of names) {
        if (row[name] !== undefined) return row[name];
      }
      return "";
    }

    async function loadRowsFromSheet() {
      try {
        const separator = SHEET_CSV_URL.includes("?") ? "&" : "?";
        const response = await fetch(SHEET_CSV_URL + separator + "cachebust=" + Date.now());
        const csvText = await response.text();
        const table = parseCSV(csvText);

        if (!table.length) return;

        const headers = table.shift().map(header => normalizeHeader(header));

        rowsFromSheet = table.map(row => {
          const obj = {};
          headers.forEach((header, index) => {
            obj[header] = (row[index] || "").trim();
          });
          return obj;
        }).filter(row => {
          const raid = getField(row, ["raid"]);
          const item = getField(row, ["item"]);
          const slot = getField(row, ["slot", "platz", "ausruestungsslot"]);
          return item && slot && (!raid || raid.toLowerCase() === CURRENT_RAID.toLowerCase());
        });

        const slots = getSlots();
        selectedSlot = slots[0] || "";
        selectedItem = selectedSlot ? getItemsBySlot(selectedSlot)[0] : "";
      } catch (error) {
        console.error("Fehler beim Laden der Google-Sheet-Daten:", error);
      }
    }

    function getSlots() {
      const slots = [...new Set(rowsFromSheet.map(row => getField(row, ["slot", "platz", "ausruestungsslot"])))]
        .filter(Boolean);

      return slots.sort((a, b) => {
        const aIndex = preferredSlotOrder.indexOf(a);
        const bIndex = preferredSlotOrder.indexOf(b);
        if (aIndex === -1 && bIndex === -1) return a.localeCompare(b);
        if (aIndex === -1) return 1;
        if (bIndex === -1) return -1;
        return aIndex - bIndex;
      });
    }

    function getItemsBySlot(slot) {
      return [...new Set(
        rowsFromSheet
          .filter(row => getField(row, ["slot", "platz", "ausruestungsslot"]) === slot)
          .map(row => getField(row, ["item"]))
          .filter(Boolean)
      )];
    }

    function getEligibleClasses(item) {
      return [...new Set(
        rowsFromSheet
          .filter(row => getField(row, ["item"]) === item)
          .map(row => getField(row, ["klasse", "class"]))
          .filter(Boolean)
      )];
    }

    function getP0Entries(item) {
      return rowsFromSheet
        .filter(row => getField(row, ["item"]) === item)
        .map(row => ({
          spieler: getField(row, ["spieler", "player", "name"]),
          klasse: getField(row, ["klasse", "class"]),
          anzahl: getField(row, ["anzahl", "p0", "prio", "count"]) || "1"
        }))
        .filter(entry => entry.spieler);
    }

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;
      const delimiter = detectDelimiter(text);

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === delimiter && !insideQuotes) {
          currentRow.push(currentValue);
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (currentValue || currentRow.length) {
            currentRow.push(currentValue);
            rows.push(currentRow);
          }
          currentRow = [];
          currentValue = "";
          if (char === "\r" && nextChar === "\n") i++;
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      return rows;
    }

    function detectDelimiter(text) {
      const firstLine = text.split(/\r?\n/)[0] || "";
      const commas = (firstLine.match(/,/g) || []).length;
      const semicolons = (firstLine.match(/;/g) || []).length;
      return semicolons > commas ? ";" : ",";
    }

    function renderSlots() {
      const wrapper = document.getElementById("slotButtons");
      const slots = getSlots();

      if (!slots.length) {
        wrapper.innerHTML = '<h2 class="panel-title">Slot wählen</h2><div class="empty">Keine BWL-Daten im Sheet gefunden.</div>';
        return;
      }

      wrapper.innerHTML = '<h2 class="panel-title">Slot wählen</h2>' + slots.map(slot => `
        <button class="slot-btn ${slot === selectedSlot ? "active" : ""}" onclick="selectSlot('${slot}')">${slot}</button>
      `).join("");
    }

    function renderItems() {
      document.getElementById("itemsTitle").textContent = selectedSlot ? selectedSlot + " · BWL Items" : "BWL Items";
      const wrapper = document.getElementById("itemButtons");
      const items = selectedSlot ? getItemsBySlot(selectedSlot) : [];

      if (!items.length) {
        wrapper.innerHTML = '<div class="empty">Für diesen Slot gibt es aktuell keine Items im Sheet.</div>';
        return;
      }

      wrapper.innerHTML = items.map(item => `
        <button class="item-btn ${item === selectedItem ? "active" : ""}" onclick="selectItem(\`${String(item).replace(/`/g, "\\`")}\`)">
          ${item}
          <span class="item-meta">${getEligibleClasses(item).join(", ")}</span>
        </button>
      `).join("");
    }

    function renderDetails() {
      const title = document.getElementById("itemTitle");
      const eligible = document.getElementById("eligibleClasses");
      const content = document.getElementById("itemContent");
      const link = document.getElementById("wowheadLink");

      if (!selectedItem) {
        title.textContent = "Item auswählen";
        eligible.innerHTML = "";
        content.innerHTML = '<div class="empty">Bitte wähle links einen Slot und anschließend ein Item aus.</div>';
        link.style.display = "none";
        return;
      }

      title.textContent = selectedItem;
      eligible.innerHTML = `<strong>Klassen:</strong> ${getEligibleClasses(selectedItem).join(", ") || "—"}`;

      if (wowheadLinks[selectedItem]) {
        link.href = wowheadLinks[selectedItem];
        link.style.display = "inline-flex";
      } else {
        link.style.display = "none";
      }

      const entries = getP0Entries(selectedItem);

      if (!entries.length) {
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead><tr><th>Spieler</th><th>Klasse</th><th>P0 gesetzt</th></tr></thead>
          <tbody>
            ${entries.map(entry => `<tr><td>${entry.spieler}</td><td>${entry.klasse}</td><td>${entry.anzahl}x</td></tr>`).join("")}
          </tbody>
        </table>
      `;
    }

    function selectSlot(slot) {
      selectedSlot = slot;
      selectedItem = getItemsBySlot(slot)[0] || "";
      renderAll();
    }

    function selectItem(itemName) {
      selectedItem = itemName;
      renderAll();
    }

    function renderAll() {
      renderSlots();
      renderItems();
      renderDetails();
    }

    loadRowsFromSheet().then(() => renderAll());
  </script>
</body>
</html>
